<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>甜品店备品操作手册</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f5f5f3; color: #1a1a1a; min-height: 100vh; }
header { background: #fff; border-bottom: 0.5px solid #e0e0d8; padding: 1.25rem 1.5rem; display: flex; align-items: center; gap: 12px; }
header h1 { font-size: 20px; font-weight: 500; color: #1a1a1a; }
header p { font-size: 13px; color: #888; margin-top: 2px; }
.logo { width: 36px; height: 36px; border-radius: 10px; background: #1D9E75; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 18px; flex-shrink: 0; }
.container { max-width: 900px; margin: 0 auto; padding: 1.5rem 1rem; }
.nav { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 1.5rem; }
.nav-btn {
  padding: 7px 16px; border-radius: 20px; border: 0.5px solid #ccc;
  background: #fff; color: #555; font-size: 13px; cursor: pointer; transition: all 0.15s;
  font-family: inherit;
}
.nav-btn:hover { background: #f0f0ee; color: #1a1a1a; }
.nav-btn.active { background: #1D9E75; border-color: #1D9E75; color: #fff; font-weight: 500; }
.section { display: none; }
.section.active { display: block; }
.section-title { font-size: 17px; font-weight: 500; color: #1a1a1a; margin-bottom: 1rem; padding-bottom: 8px; border-bottom: 0.5px solid #e0e0d8; }
.item-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 12px; }
.item-card { background: #fff; border: 0.5px solid #e0e0d8; border-radius: 12px; overflow: hidden; cursor: pointer; transition: border-color 0.15s; }
.item-card:hover { border-color: #bbb; }
.item-card.expanded { border-color: #1D9E75; }
.card-header { padding: 12px 14px; display: flex; justify-content: space-between; align-items: center; }
.card-name { font-size: 15px; font-weight: 500; color: #1a1a1a; }
.card-sub { font-size: 12px; color: #888; margin-top: 2px; }
.card-badge { font-size: 11px; padding: 3px 8px; border-radius: 12px; white-space: nowrap; background: #E1F5EE; color: #0F6E56; flex-shrink: 0; }
.badge-red { background: #FAECE7; color: #993C1D; }
.badge-blue { background: #E6F1FB; color: #185FA5; }
.card-body { display: none; border-top: 0.5px solid #e0e0d8; }
.item-card.expanded .card-body { display: block; }
.card-chevron { font-size: 11px; color: #aaa; margin-left: 8px; transition: transform 0.15s; display: inline-block; }
.item-card.expanded .card-chevron { transform: rotate(180deg); }
table.info { width: 100%; border-collapse: collapse; font-size: 13px; }
table.info tr:not(:last-child) td { border-bottom: 0.5px solid #f0f0ee; }
table.info td { padding: 7px 14px; vertical-align: top; line-height: 1.5; }
table.info td:first-child { color: #888; width: 72px; white-space: nowrap; }
table.info td:last-child { color: #1a1a1a; }
.note { font-size: 12px; color: #555; margin-top: 1rem; padding: 8px 12px; background: #f5fdf9; border-radius: 8px; border-left: 3px solid #1D9E75; }
footer { text-align: center; font-size: 12px; color: #aaa; padding: 2rem 1rem; }
</style>
</head>
<body>
<header>
  <div class="logo">🍵</div>
  <div>
    <h1>甜品店备品操作手册</h1>
    <p>Dessert Shop Preparation Manual</p>
  </div>
</header>

<div class="container">
  <nav class="nav" id="nav"></nav>
  <div id="content"></div>
</div>

<footer>甜品店内部使用 · 请勿外传</footer>

<script>
const data = [
  {
    id: "tea", label: "茶饮", items: [
      { name: "红茶", sub: "Black Tea / BT", badge: "3天",
        rows: [["热水","4000 ml（100°C）"],["茶叶","130 g"],["泡茶","10 分钟"],["过滤","加滤布 + 滤网"],["成品","导入加有 2000 g 冰的豆花桶"],["数量","一般做 1 份"]] },
      { name: "绿茶", sub: "Green Tea / GT", badge: "3天",
        rows: [["热水","4000 ml（75°C）"],["茶叶","100 g"],["泡茶","7 分钟"],["过滤","加滤布 + 滤网"],["成品","导入加有 2000 g 冰的豆花桶"],["数量","一般做 2 份"]] },
      { name: "奶茶", sub: "Milk Tea / MT", badge: "3天",
        rows: [["热水","4000 ml（100°C）"],["茶叶","130 g"],["泡茶","10 分钟"],["过滤","加滤布 + 滤网"],["成品","豆花桶内先加 450 g 奶粉，再加 600 g 冰"],["数量","一般做 2 份"]] },
      { name: "奶绿", sub: "Milk Green Tea", badge: "3天",
        rows: [["热水","4000 ml（75°C）"],["茶叶","100 g"],["泡茶","7 分钟"],["过滤","加滤布 + 滤网"],["成品","豆花桶内先加 450 g 奶粉，再加 600 g 冰"],["备注","缩写待确认"]] },
      { name: "乌龙茶", sub: "Oolong Tea / OT", badge: "3天",
        rows: [["热水","4000 ml"],["茶叶","100 g"],["煮法","2400 火煮开，5 分钟后关火，焖 10 分钟"],["过滤","加滤布 + 滤网"],["成品","导入加有 2000 g 冰的豆花桶"]] },
      { name: "仙草干茶", sub: "Herbal Grass Tea / HT", badge: "3天",
        rows: [["材料","热水 500 ml + 仙草汁 500 ml + 冬瓜砖 25 g + 红糖 112 g + 白糖 112 g"],["做法","熬化所有糖及冬瓜砖"],["成品","导入加有 830 g 冰 + 333 ml 凉水的豆花桶"]] },
    ],
    note: "⚠️ 所有茶导入豆花桶前必须加滤布及滤网过滤。"
  },
  {
    id: "syrup", label: "糖水", items: [
      { name: "芋圆糖水", sub: "TBS", badge: "2天",
        rows: [["热水","3500 ml"],["糖","二砂糖 500 g + 白糖 500 g"],["做法","混合煮沸"]] },
      { name: "冰糖水", sub: "CS", badge: "2天",
        rows: [["炼糖","10 勺（约 2500 ml）"],["水","8000 ml"],["做法","混合均匀"]] },
    ]
  },
  {
    id: "dessert", label: "甜品", items: [
      { name: "紫米粥", sub: "PRS", badge: "2天",
        rows: [["材料","糯米 500 g + 黑米 400 g + 红豆 300 g + 热水 13000 ml"],["煮法","大火压力锅，上汽转 800，30 分钟，关火泄气"],["调味","二砂糖 450 g + 白糖 450 g"],["存放","放入 2 凉 2 热方形盘"]] },
      { name: "烧仙草", sub: "Burned Grass Jelly", badge: "2天",
        rows: [["材料","仙草汁 1500 ml + 热水 6000 ml + 白糖 450 g + 冬瓜砖 75 g"],["勾芡","30 g : 100 ml"],["做法","煮融化后勾芡，倒桶时加滤网"]] },
      { name: "仙草冻", sub: "Grass Jelly / GJ", badge: "5天",
        rows: [["材料","仙草汁 3000 ml（1 罐）+ 热水 10000 ml + 白糖 900 g + 二砂糖 300 g"],["勾芡","150 g : 1000 ml"],["做法","先化糖，加仙草汁煮开转 1200 中火，勾芡后每 10 min 搅拌，每分钟换方向，关火再搅拌 1 分钟"],["出品","倒桶时加滤网"]] },
      { name: "红豆酱", sub: "RBS", badge: "2天",
        rows: [["材料","红豆 2000 g + 糯米 200 g + 热水 8000 ml"],["煮法","高压锅，上汽转 800，6 分钟，关火泄气"],["调味","二砂糖 600 g + 白糖 600 g"]] },
      { name: "红豆汤", sub: "Red Bean Soup", badge: "2天",
        rows: [["材料","红豆酱 9 勺（约 3400 g）+ 热水 3000 ml"],["做法","红豆酱打碎，加热水，中火 2700 搅拌煮开"],["勾芡","30 g : 100 ml"]] },
      { name: "焦糖布丁", sub: "Caramel Pudding", badge: "当天",
        rows: [["材料","布丁粉 630 g + 焦糖粉 190 g"],["布丁液","5000 ml 水 + 布丁粉煮开，过滤进量杯"],["焦糖液","375 ml 水 + 焦糖粉，方形容器煮开"],["组合","布丁液入布丁杯，加 0.5 勺焦糖液"]] },
    ]
  },
  {
    id: "topping", label: "配料", items: [
      { name: "芋圆", sub: "Taro Ball", badge: "及时", badgeClass: "badge-red",
        rows: [["热水","5000 ml，大火煮至膨胀飘起"],["过水","过热水"],["存放","放入 TBS"]] },
      { name: "小芋圆", sub: "Mini Taro", badge: "及时", badgeClass: "badge-red",
        rows: [["热水","5000 ml，大火煮至膨胀飘起"],["过水","过冷水"],["存放","放入 CS"]] },
      { name: "珍珠", sub: "Tapioca Pearl", badge: "及时", badgeClass: "badge-red",
        rows: [["热水","8000 ml，滚开后煮 25 分钟，焖 20 分钟，冲冷水"],["存放","白糖:二砂:珍珠 = 1:1:10，热水化开糖"]] },
      { name: "白汤圆", sub: "White Glutinous", badge: "及时", badgeClass: "badge-red",
        rows: [["热水","5000 ml，煮至飘起"],["存放","放入 TBS"]] },
      { name: "西米露", sub: "Sago", badge: "及时", badgeClass: "badge-red",
        rows: [["材料","水 5000 ml + 西米 2 cup"],["做法","水滚开煮 15 分钟，焖 15 分钟，过冷水"],["存放","导入 WS"]] },
    ],
    note: "⚠️ 以上配料均即做即用，不可久放。"
  },
  {
    id: "cream", label: "奶霜", items: [
      { name: "奶霜", sub: "Milk Foam / WC", badge: "5天", badgeClass: "badge-blue",
        rows: [["材料","鲜奶油 500 ml + 鲜奶 500 ml + 奶盖粉 250 g"],["做法","先将鲜奶油打发，再将鲜奶与奶盖粉缓慢加入，继续搅拌打发"]] },
    ]
  },
  {
    id: "root", label: "根茎", items: [
      { name: "芋头", sub: "Taro Chunks", badge: "2天",
        rows: [["用量","2 KG"],["材料","白糖 400 g + 盐 1 g + 热水 2000 ml"],["煮法","2400 火煮沸 5 min → 蒸锅 10 min → 保温 15 min"],["判断","能戳透即可"],["存放","翻锅放入蒸锅出餐"]] },
      { name: "地瓜", sub: "Sweet Potato", badge: "2天",
        rows: [["用量","2.5 KG"],["预处理","削皮，泡入 2500 ml 水 + 柠檬汁 10 ml"],["煮法","热水 2500 ml + 白糖 800 g 煮沸，加地瓜 + 柠檬汁 10 ml，煮沸 5 min"],["后续","蒸锅 15 min → 保温 15 min"]] },
      { name: "紫薯", sub: "Purple Sweet Potato / PSP", badge: "2天",
        rows: [["材料","热水 1500 ml + 白糖 800 g + 柠檬汁 10 ml + 冻 PSP 2000 g"],["煮法","2400 煮开 5 min → 蒸锅 15 min → 保温 15 min"]] },
    ]
  },
  {
    id: "bean", label: "豆类", items: [
      { name: "花豆", sub: "KB", badge: "3天",
        rows: [["泡发","3000 ml 水 + 盐 10 g，泡 1 小时"],["袋子","扎紧"],["压力锅","8000 ml 热水，上汽转 800，15 分钟"],["糖水","热水 2000 ml + 二砂 500 g + 白糖 500 g 煮沸"],["存放","2 凉 2 热方形容器"]] },
      { name: "绿豆", sub: "MB", badge: "3天",
        rows: [["泡发","3000 ml 水 + 盐 10 g，泡 1 小时"],["袋子","不紧扎"],["压力锅","8000 ml 热水，上汽转 800，3 分钟"],["糖水","热水 2000 ml + 二砂 500 g + 白糖 500 g 煮沸"],["存放","2 凉 2 热方形容器"]] },
      { name: "红豆", sub: "RB", badge: "3天",
        rows: [["泡发","3000 ml 水 + 盐 10 g，泡 1 小时"],["袋子","不紧扎"],["压力锅","8000 ml 热水，上汽转 800，4 分钟"],["糖水","热水 2000 ml + 二砂 500 g + 白糖 500 g 煮沸"],["存放","2 凉 2 热方形容器"]] },
      { name: "花生", sub: "Peanut", badge: "3天",
        rows: [["泡发","3000 ml 水 + 盐 60 g，泡 1 小时"],["袋子","不紧扎"],["压力锅","8000 ml 热水，上汽转 800，25 分钟，过热水"],["糖水","热水 2500 ml + 白糖 1000 g 煮沸"],["存放","2 凉 2 热方形容器"]] },
      { name: "薏仁", sub: "Barley", badge: "3天",
        rows: [["泡发","无需泡发，清洗后直接入袋"],["袋子","扎紧"],["压力锅","8000 ml 热水，上汽转 800，1 分钟，过凉水"],["糖水","热水 4500 ml + 白糖 1500 g 煮沸"],["存放","2 凉 2 热方形容器"]] },
    ],
    note: "以上配方均为 1 KG 配方。"
  },
];

const nav = document.getElementById('nav');
const content = document.getElementById('content');

data.forEach(sec => {
  const btn = document.createElement('button');
  btn.className = 'nav-btn';
  btn.textContent = sec.label;
  btn.onclick = () => {
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('sec-' + sec.id).classList.add('active');
  };
  nav.appendChild(btn);

  const div = document.createElement('div');
  div.className = 'section';
  div.id = 'sec-' + sec.id;

  const title = document.createElement('div');
  title.className = 'section-title';
  title.textContent = sec.label + '类';
  div.appendChild(title);

  const grid = document.createElement('div');
  grid.className = 'item-grid';

  sec.items.forEach(item => {
    const card = document.createElement('div');
    card.className = 'item-card';
    const badgeClass = item.badgeClass || '';
    card.innerHTML = `
      <div class="card-header">
        <div>
          <div class="card-name">${item.name}</div>
          <div class="card-sub">${item.sub}</div>
        </div>
        <div style="display:flex;align-items:center;gap:6px;">
          <span class="card-badge ${badgeClass}">保质 ${item.badge}</span>
          <span class="card-chevron">▼</span>
        </div>
      </div>
      <div class="card-body">
        <table class="info">
          ${item.rows.map(r => `<tr><td>${r[0]}</td><td>${r[1]}</td></tr>`).join('')}
        </table>
      </div>`;
    card.querySelector('.card-header').onclick = () => card.classList.toggle('expanded');
    grid.appendChild(card);
  });

  div.appendChild(grid);

  if (sec.note) {
    const note = document.createElement('div');
    note.className = 'note';
    note.textContent = sec.note;
    div.appendChild(note);
  }

  content.appendChild(div);
});

nav.children[0].click();
</script>
</body>
</html>
