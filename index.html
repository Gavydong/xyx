<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>甜品店备品操作手册</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f5f5f3; color: #1a1a1a; min-height: 100vh; }
header { background: #fff; border-bottom: 0.5px solid #e0e0d8; padding: 1.25rem 1.5rem; display: flex; align-items: center; gap: 12px; }
header h1 { font-size: 20px; font-weight: 500; color: #1a1a1a; }
header p { font-size: 13px; color: #888; margin-top: 2px; }
.logo { width: 36px; height: 36px; border-radius: 10px; background: #1D9E75; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 18px; flex-shrink: 0; }
.container { max-width: 900px; margin: 0 auto; padding: 1.5rem 1rem; }
.nav { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 1.5rem; }
.nav-btn { padding: 7px 16px; border-radius: 20px; border: 0.5px solid #ccc; background: #fff; color: #555; font-size: 13px; cursor: pointer; transition: all 0.15s; font-family: inherit; }
.nav-btn:hover { background: #f0f0ee; color: #1a1a1a; }
.nav-btn.active { background: #1D9E75; border-color: #1D9E75; color: #fff; font-weight: 500; }
.section { display: none; }
.section.active { display: block; }
.section-title { font-size: 17px; font-weight: 500; color: #1a1a1a; margin-bottom: 1rem; padding-bottom: 8px; border-bottom: 0.5px solid #e0e0d8; }
.item-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 12px; }
.item-card { background: #fff; border: 0.5px solid #e0e0d8; border-radius: 12px; overflow: hidden; cursor: pointer; transition: border-color 0.15s; }
.item-card:hover { border-color: #bbb; }
.item-card.expanded { border-color: #1D9E75; }
.card-header { padding: 12px 14px; display: flex; justify-content: space-between; align-items: center; }
.card-name { font-size: 15px; font-weight: 500; color: #1a1a1a; }
.card-sub { font-size: 12px; color: #888; margin-top: 2px; }
.card-badge { font-size: 11px; padding: 3px 8px; border-radius: 12px; white-space: nowrap; background: #E1F5EE; color: #0F6E56; flex-shrink: 0; }
.badge-red { background: #FAECE7; color: #993C1D; }
.badge-blue { background: #E6F1FB; color: #185FA5; }
.card-body { display: none; border-top: 0.5px solid #e0e0d8; }
.item-card.expanded .card-body { display: block; }
.card-chevron { font-size: 11px; color: #aaa; margin-left: 8px; transition: transform 0.15s; display: inline-block; }
.item-card.expanded .card-chevron { transform: rotate(180deg); }
table.info { width: 100%; border-collapse: collapse; font-size: 13px; }
table.info tr:not(:last-child) td { border-bottom: 0.5px solid #f0f0ee; }
table.info td { padding: 7px 14px; vertical-align: top; line-height: 1.5; }
table.info td:first-child { color: #888; width: 72px; white-space: nowrap; }
table.info td:last-child { color: #1a1a1a; }
.note { font-size: 12px; color: #555; margin-top: 1rem; padding: 8px 12px; background: #f5fdf9; border-radius: 8px; border-left: 3px solid #1D9E75; }
.progress-text { font-size: 12px; color: #888; margin-bottom: 1rem; }
.step-list { display: flex; flex-direction: column; gap: 8px; }
.step-item { background: #fff; border: 0.5px solid #e0e0d8; border-radius: 10px; overflow: hidden; }
.step-item.warn { border-color: #D85A30; }
.step-item.done { opacity: 0.55; }
.step-item.done .step-title { text-decoration: line-through; color: #aaa; }
.step-item.done .step-num { background: #1D9E75; color: #fff; }
.step-item.done .check-btn { background: #1D9E75; border-color: #1D9E75; color: #fff; }
.step-row { display: flex; align-items: center; gap: 12px; padding: 12px 14px; cursor: pointer; user-select: none; }
.step-num { width: 28px; height: 28px; border-radius: 50%; background: #E1F5EE; color: #0F6E56; font-size: 13px; font-weight: 500; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.step-item.warn .step-num { background: #FAECE7; color: #993C1D; }
.step-title { font-size: 14px; font-weight: 500; color: #1a1a1a; flex: 1; }
.step-chevron { font-size: 11px; color: #aaa; transition: transform 0.15s; flex-shrink: 0; }
.step-item.open .step-chevron { transform: rotate(180deg); }
.step-detail { display: none; padding: 8px 14px 12px 54px; font-size: 13px; color: #555; line-height: 1.7; border-top: 0.5px solid #f0f0ee; }
.step-item.open .step-detail { display: block; }
.warn-text { color: #993C1D; font-weight: 500; }
.check-btn { width: 22px; height: 22px; border-radius: 50%; border: 1.5px solid #ccc; background: #fff; cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 12px; color: transparent; transition: all 0.15s; padding: 0; font-family: inherit; }
.reset-btn { margin-top: 1rem; padding: 8px 16px; border-radius: 20px; border: 0.5px solid #ccc; background: #fff; color: #888; font-size: 12px; cursor: pointer; font-family: inherit; }
.fridge-block { margin-bottom: 1.5rem; }
.fridge-title { font-size: 14px; font-weight: 500; color: #0F6E56; margin-bottom: 8px; padding: 8px 12px; background: #E1F5EE; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; }
.fridge-count { font-size: 12px; font-weight: 400; }
.inv-item { display: flex; align-items: center; gap: 12px; padding: 10px 12px; background: #fff; border: 0.5px solid #e0e0d8; border-radius: 8px; margin-bottom: 6px; cursor: pointer; user-select: none; transition: all 0.15s; }
.inv-item:hover { border-color: #bbb; }
.inv-item.checked { background: #FAECE7; border-color: #D85A30; }
.inv-item.checked .inv-name { color: #993C1D; font-weight: 500; }
.inv-item.checked .inv-check { background: #D85A30; border-color: #D85A30; color: #fff; }
.inv-check { width: 22px; height: 22px; border-radius: 50%; border: 1.5px solid #ccc; background: #fff; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 12px; color: transparent; transition: all 0.15s; }
.inv-name { font-size: 14px; font-weight: 500; color: #1a1a1a; min-width: 110px; }
.inv-std { font-size: 12px; color: #888; flex: 1; }
.btn-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 1rem; }
.inv-done-btn { padding: 9px 18px; border-radius: 20px; border: 0.5px solid #1D9E75; background: #E1F5EE; color: #0F6E56; font-size: 13px; cursor: pointer; font-family: inherit; font-weight: 500; }
.inv-reset-btn { padding: 9px 18px; border-radius: 20px; border: 0.5px solid #ccc; background: #fff; color: #888; font-size: 13px; cursor: pointer; font-family: inherit; }
.inv-summary { margin-top: 1rem; padding: 12px 14px; border-radius: 8px; font-size: 13px; display: none; border-left: 3px solid; line-height: 1.8; }
.inv-summary.visible { display: block; }
.inv-summary.need { background: #FAECE7; border-color: #D85A30; color: #993C1D; }
.inv-summary.ok { background: #E1F5EE; border-color: #1D9E75; color: #0F6E56; }
.inv-summary-title { font-weight: 500; margin-bottom: 6px; }
footer { text-align: center; font-size: 12px; color: #aaa; padding: 2rem 1rem; }
</style>
</head>

var nav = document.getElementById('nav');
var content = document.getElementById('content');

SECTIONS.forEach(function(sec) {
  var btn = document.createElement('button');
  btn.className = 'nav-btn';
  btn.textContent = sec.label;
  btn.addEventListener('click', function() {
    document.querySelectorAll('.nav-btn').forEach(function(b) { b.classList.remove('active'); });
    document.querySelectorAll('.section').forEach(function(s) { s.classList.remove('active'); });
    btn.classList.add('active');
    document.getElementById('sec-' + sec.id).classList.add('active');
  });
  nav.appendChild(btn);

  var div = document.createElement('div');
  div.className = 'section';
  div.id = 'sec-' + sec.id;

  var titleEl = document.createElement('div');
  titleEl.className = 'section-title';
  titleEl.textContent = sec.label;
  div.appendChild(titleEl);

  if (sec.type === 'steps') { renderSteps(div, sec); }
  else if (sec.type === 'inventory') { renderInventory(div, sec); }
  else { renderCards(div, sec); }

  content.appendChild(div);
});

function renderSteps(div, sec) {
  var prog = document.createElement('div');
  prog.className = 'progress-text';
  prog.id = 'prog-' + sec.id;
  prog.textContent = '0 / ' + sec.steps.length + ' 完成';
  div.appendChild(prog);

  var list = document.createElement('div');
  list.className = 'step-list';

  sec.steps.forEach(function(step) {
    var item = document.createElement('div');
    item.className = 'step-item' + (step.warn ? ' warn' : '');

    var detailHtml = '';
    if (step.detail) {
      detailHtml = step.detail.split('｜').map(function(p) {
        return step.warn ? p.replace('火不能高否则锅会糊！', '<span class="warn-text">火不能高否则锅会糊！</span>') : p;
      }).join('<br>');
    }

    var rowDiv = document.createElement('div');
    rowDiv.className = 'step-row';
    rowDiv.innerHTML =
      '<button class="check-btn">✓</button>' +
      '<div class="step-num">' + step.num + '</div>' +
      '<div class="step-title">' + step.title + '</div>' +
      (step.detail ? '<span class="step-chevron">▼</span>' : '');
    item.appendChild(rowDiv);

    if (step.detail) {
      var detailDiv = document.createElement('div');
      detailDiv.className = 'step-detail';
      detailDiv.innerHTML = detailHtml;
      item.appendChild(detailDiv);
    }

    var checkBtn = rowDiv.querySelector('.check-btn');
    checkBtn.addEventListener('click', function(e) {
      e.stopPropagation();
      item.classList.toggle('done');
      var done = div.querySelectorAll('.step-item.done').length;
      document.getElementById('prog-' + sec.id).textContent = done + ' / ' + sec.steps.length + ' 完成';
    });

    if (step.detail) {
      rowDiv.addEventListener('click', function(e) {
        if (e.target === checkBtn || checkBtn.contains(e.target)) return;
        item.classList.toggle('open');
      });
    }

    list.appendChild(item);
  });

  div.appendChild(list);

  var resetBtn = document.createElement('button');
  resetBtn.className = 'reset-btn';
  resetBtn.textContent = '重置所有勾选';
  resetBtn.addEventListener('click', function() {
    div.querySelectorAll('.step-item').forEach(function(i) { i.classList.remove('done', 'open'); });
    document.getElementById('prog-' + sec.id).textContent = '0 / ' + sec.steps.length + ' 完成';
  });
  div.appendChild(resetBtn);
}

function renderInventory(div, sec) {
  var totalItems = sec.fridges.reduce(function(s, f) { return s + f.items.length; }, 0);

  var prog = document.createElement('div');
  prog.className = 'progress-text';
  prog.id = 'inv-prog';
  prog.textContent = '需补货 0 / ' + totalItems + ' 项';
  div.appendChild(prog);

  sec.fridges.forEach(function(fridge) {
    var block = document.createElement('div');
    block.className = 'fridge-block';
    block.id = 'fblock-' + fridge.name;

    var ftitle = document.createElement('div');
    ftitle.className = 'fridge-title';
    ftitle.innerHTML = '<span>' + fridge.name + '</span><span class="fridge-count" id="fc-' + fridge.name + '">0/' + fridge.items.length + '</span>';
    block.appendChild(ftitle);

    fridge.items.forEach(function(item) {
      var row = document.createElement('div');
      row.className = 'inv-item';
      row.innerHTML = '<div class="inv-check">✓</div><div class="inv-name">' + item.name + '</div><div class="inv-std">' + item.std + '</div>';
      row.addEventListener('click', function() {
        row.classList.toggle('checked');
        var secEl = document.getElementById('sec-inventory');
        var checked = secEl.querySelectorAll('.inv-item.checked').length;
        document.getElementById('inv-prog').textContent = '需补货 ' + checked + ' / ' + totalItems + ' 项';
        var fridgeChecked = block.querySelectorAll('.inv-item.checked').length;
        document.getElementById('fc-' + fridge.name).textContent = fridgeChecked + '/' + fridge.items.length;
      });
      block.appendChild(row);
    });

    div.appendChild(block);
  });

  var summary = document.createElement('div');
  summary.className = 'inv-summary';
  summary.id = 'inv-summary';
  div.appendChild(summary);

  var btnRow = document.createElement('div');
  btnRow.className = 'btn-row';

  var doneBtn = document.createElement('button');
  doneBtn.className = 'inv-done-btn';
  doneBtn.textContent = '查看今日备货清单';
  doneBtn.addEventListener('click', function() {
    var secEl = document.getElementById('sec-inventory');
    var checked = secEl.querySelectorAll('.inv-item.checked .inv-name');
    if (checked.length === 0) {
      summary.className = 'inv-summary visible ok';
      summary.innerHTML = '<div class="inv-summary-title">今日无需备货！</div>所有品项库存充足。';
    } else {
      var names = Array.from(checked).map(function(n) { return '• ' + n.textContent; }).join('<br>');
      summary.className = 'inv-summary visible need';
      summary.innerHTML = '<div class="inv-summary-title">今日需备货（' + checked.length + ' 项）：</div>' + names;
    }
  });

  var resetBtn = document.createElement('button');
  resetBtn.className = 'inv-reset-btn';
  resetBtn.textContent = '重置';
  resetBtn.addEventListener('click', function() {
    div.querySelectorAll('.inv-item').forEach(function(i) { i.classList.remove('checked'); });
    summary.className = 'inv-summary';
    summary.innerHTML = '';
    document.getElementById('inv-prog').textContent = '需补货 0 / ' + totalItems + ' 项';
    sec.fridges.forEach(function(f) {
      var fc = document.getElementById('fc-' + f.name);
      if (fc) fc.textContent = '0/' + f.items.length;
    });
  });

  btnRow.appendChild(doneBtn);
  btnRow.appendChild(resetBtn);
  div.appendChild(btnRow);
}

function renderCards(div, sec) {
  var grid = document.createElement('div');
  grid.className = 'item-grid';

  sec.items.forEach(function(item) {
    var card = document.createElement('div');
    card.className = 'item-card';
    var badgeClass = item.badgeClass || '';
    var rowsHtml = item.rows.map(function(r) { return '<tr><td>' + r[0] + '</td><td>' + r[1] + '</td></tr>'; }).join('');
    card.innerHTML =
      '<div class="card-header">' +
        '<div><div class="card-name">' + item.name + '</div><div class="card-sub">' + item.sub + '</div></div>' +
        '<div style="display:flex;align-items:center;gap:6px;">' +
          '<span class="card-badge ' + badgeClass + '">保质 ' + item.badge + '</span>' +
          '<span class="card-chevron">▼</span>' +
        '</div>' +
      '</div>' +
      '<div class="card-body"><table class="info">' + rowsHtml + '</table></div>';
    card.querySelector('.card-header').addEventListener('click', function() { card.classList.toggle('expanded'); });
    grid.appendChild(card);
  });

  div.appendChild(grid);

  if (sec.note) {
    var note = document.createElement('div');
    note.className = 'note';
    note.textContent = sec.note;
    div.appendChild(note);
  }
}

nav.children[0].click();
</script>
